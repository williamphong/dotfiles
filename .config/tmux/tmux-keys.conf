# --- Windows & Panes ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# --- Smart-Splits Navigation (Ctrl + h/j/k/l) ---
bind-key -n C-h run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh left'
bind-key -n C-j run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh down'
bind-key -n C-k run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh up'
bind-key -n C-l run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh right'

# --- Smart-Splits Resizing (Alt + h/j/k/l) ---
bind-key -n M-h run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh resize-left'
bind-key -n M-j run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh resize-down'
bind-key -n M-k run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh resize-up'
bind-key -n M-l run-shell 'sh ~/.tmux/plugins/smart-splits/smart-splits.sh resize-right'

# --- Utility ---
# Send C-l (clear screen) via prefix since C-l is taken by smart-splits
bind C-l send-keys 'C-l'

# --- Copy Mode (vi) ---
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
